<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Head Soccer - Neon Cup</title>
    <meta name="description"
        content="Um clone premium do Head Soccer com física arcade e estética neon. Desafie seus amigos!">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <div class="score-board glass">
                <div class="player p1-score">
                    <div class="avatar"></div>
                    <span id="p1-goals">0</span>
                </div>
                <div class="timer-container">
                    <div id="timer">60</div>
                </div>
                <div class="player p2-score">
                    <span id="p2-goals">0</span>
                    <div class="avatar"></div>
                </div>
            </div>

            <div id="match-status" class="hidden">
                <h2 id="status-text">GOL!</h2>
            </div>

            <div id="start-screen" class="glass-heavy">
                <h1>HEAD SOCCER <span class="neon-text">NEON</span></h1>
                <div class="controls-guide">
                    <div class="guide-item">
                        <h3>P1 (Esquerda)</h3>
                        <p>AWDS - Mover/Pular/Chutar</p>
                    </div>
                    <div class="guide-item">
                        <h3>P2 (Direita)</h3>
                        <p>Setas - Mover/Pular/Chutar</p>
                    </div>
                </div>
                <button id="start-btn">COMEÇAR PARTIDA</button>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>

    <script src="game.js"></script>
</body>

</html>
